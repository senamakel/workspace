# Shared tmux behavior. Host-specific colors are applied by workspace-tmux.

# The outer/master session keeps tmux's standard prefix. Dedicated remote
# workspace servers override this to C-z after loading this file.
set-option -g prefix C-b
unbind-key C-z
bind-key C-b send-prefix

# Mouse support makes windows, panes, resizing, and scrollback clickable.
set-option -g mouse on
set-option -g focus-events on
set-option -g set-clipboard on
set-option -g allow-passthrough on
set-option -g history-limit 100000

# Keep inactive panes dark while allowing the active pane to use the terminal's
# native background. workspace-tmux supplies each host's accent colors.
set-option -g pane-border-status top
set-option -g pane-border-format ' #{pane_title} '
set-option -g pane-border-style bg=colour0
set-option -g pane-active-border-style bg=colour0
set-window-option -g window-active-style bg=terminal
set-window-option -g window-style bg=colour0
